version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: spykar_postgres
    restart: unless-stopped
    # 1 GB shared memory — defaults to 64 MB which OOMs the 7-way parallel
    # network-pulse queries that aggregate over 5 L+ inventory_snapshot rows
    # joined to skus. With shm_size=1g the heaviest combo (mode=all + style
    # filter) finishes well under the budget.
    shm_size: 1g
    environment:
      POSTGRES_DB: spykar_inventory
      POSTGRES_USER: spykar_app
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spykar_app -d spykar_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: spykar_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Server ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spykar_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: spykar_inventory
      PG_USER: spykar_app
      PG_PASSWORD: ${PG_PASSWORD:-changeme}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      MSSQL_HOST: ${MSSQL_HOST}
      MSSQL_DATABASE: ${MSSQL_DATABASE}
      MSSQL_USER: ${MSSQL_USER}
      MSSQL_PASSWORD: ${MSSQL_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENABLE_SCHEDULER: "true"
    ports:
      - "4000:4000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
